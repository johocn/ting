events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }

    upstream admin_frontend {
        server ting_admin_frontend:80;
    }

    upstream mobile_frontend {
        server ting_mobile_frontend:80;
    }

    server {
        listen 80;
        server_name www.joyogo.com joyogo.com;
        
        # API服务 - www.joyogo.com/tingapi
        location /tingapi {
            rewrite ^/tingapi/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # 特别处理Swagger UI的openapi.json请求
        # 当在/tingapi/docs页面中的JS请求/openapi.json时，将其重写到后端
        location = /openapi.json {
            proxy_pass http://backend/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Admin界面 - www.joyogo.com/tingadmin
        location /tingadmin {
            proxy_pass http://admin_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
        
        # 移动端H5前端界面 - www.joyogo.com/ting
        location /ting {
            proxy_pass http://mobile_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
        
        # 如果直接访问根路径
        location = / {
            return 200 "Ting Learning Platform API Service\nUse /tingapi to access the API\nAdmin interface at /tingadmin\nFrontend at /ting";
            add_header Content-Type text/plain;
        }
    }
}