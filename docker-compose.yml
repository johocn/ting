version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:13
    container_name: ting_postgres
    environment:
      POSTGRES_DB: ting_db
      POSTGRES_USER: ting_user
      POSTGRES_PASSWORD: ting_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ting_network

  # Redis 缓存
  redis:
    image: redis:6-alpine
    container_name: ting_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ting_network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ting_backend
    ports:
      - "8100:8000"
    environment:
      - DATABASE_URL=postgresql://ting_user:ting_password@postgres:5432/ting_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=your-secret-key-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - WECHAT_APP_ID=
      - WECHAT_APP_SECRET=
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - ting_network

  # 管理员前端
  admin-frontend:
    image: nginx:alpine
    container_name: ting_admin_frontend
    volumes:
      - ./frontend/admin/dist:/usr/share/nginx/html
    ports:
      - "3000:80"
    networks:
      - ting_network

  # 移动端 H5 前端 (静态版本)
  mobile-frontend:
    image: nginx:alpine
    container_name: ting_mobile_frontend
    volumes:
      - ./frontend/mobile/h5-static:/usr/share/nginx/html
    networks:
      - ting_network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ting_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - admin-frontend
      - mobile-frontend
    networks:
      - ting_network

networks:
  ting_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
